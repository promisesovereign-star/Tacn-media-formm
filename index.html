<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TACN Media Department - Duty Form</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <div class="container">
    <img src="apc.jpg" alt="TACN Logo" class="logo">
    <h1>TACN Media Department</h1>
    <h2>Media Duty Registration Form</h2>

    <form action="https://formsubmit.co/promisesovereign@gmail.com" method="POST">
      
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://promisesovereign-star.github.io/tacn-form/thanks.html">

      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Phone Number</label>
      <input type="tel" name="phone" required>

      <label>Email Address</label>
      <input type="email" name="email" required>

      <label>Department/Unit</label>
      <input type="text" name="department" required>

      <label>Day You Can Serve</label>
      <select name="day" required>
        <option value="">--Select Day--</option>
        <option>Sunday</option>
        <option>Wednesday</option>
        <option>Friday</option>
      </select>

      <label>Skill/Role</label>
      <input type="text" name="skill" placeholder="Camera, Graphics, Sound, etc" required>

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
